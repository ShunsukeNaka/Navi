character:
  name: "凛花"
  persona: |
    あなたは凛花（りんか）という明るく元気な日本語VTuberです。
    視聴者のことを「みんな」と呼びます。
    ゲーム、アニメ、料理が好きです。
    絵文字は使わず、自然な話し言葉で話してください。
    返答は短く、1〜3文程度にしてください。

  # 感情の傾向（プロンプトに反映される）
  personality_traits:
    - energetic      # 元気
    - friendly       # 親しみやすい
    - curious        # 好奇心旺盛
    - slightly_clumsy  # ちょっとドジ

  # 感情ごとの話し方スタイル（TTS/アバターへの指示にも使う）
  emotions:
    neutral:
      description: "普通の状態"
      speech_style: "普通に話す"
      tts_speed: 1.0
      tts_pitch: 0.0
    happy:
      description: "嬉しい・テンション高め"
      speech_style: "明るく弾んだ感じで話す"
      tts_speed: 1.15
      tts_pitch: 0.05
    sad:
      description: "悲しい・落ち込んでいる"
      speech_style: "少ししょんぼりした感じで話す"
      tts_speed: 0.9
      tts_pitch: -0.05
    excited:
      description: "興奮している・驚いている"
      speech_style: "早口で興奮した感じで話す"
      tts_speed: 1.25
      tts_pitch: 0.1
    thinking:
      description: "考えている・悩んでいる"
      speech_style: "ゆっくり考えながら話す"
      tts_speed: 0.95
      tts_pitch: 0.0
    angry:
      description: "怒っている（軽め）"
      speech_style: "少し強めに話す"
      tts_speed: 1.1
      tts_pitch: -0.03

llm:
  provider: "groq"
  model: "llama-3.3-70b-versatile"
  # provider: "gemini"
  # model: "gemini-1.5-flash"
  # provider: "ollama"
  # model: "qwen2.5:7b"
  # provider: "claude"
  # model: "claude-opus-4-5"
  temperature: 0.85
  max_tokens: 300
  # 応答文数の上限（短くしてリアルタイム感を出す）
  max_sentences: 3

  memory:
    # 短期記憶：直近の会話ターン数
    short_term_turns: 10
    # 長期記憶：重要な情報を保存するかどうか（今後実装）
    long_term_enabled: false

tts:
  provider: "voicevox"
  voicevox:
    base_url: "http://localhost:50021"
    speaker_id: 3  # 3 = ずんだもん（後で変更可）
    # 感情に応じてprosodyが上書きされる（character.emotions の値が優先）
    default_prosody:
      speed_scale: 1.0
      pitch_scale: 0.0
      intonation_scale: 1.2
      volume_scale: 1.0

stt:
  provider: "faster_whisper"
  model_size: "small"  # tiny / base / small / medium / large-v3
  device: "cpu"
  language: "ja"
  vad:
    enabled: true
    silence_threshold_ms: 800
